<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F172A">
<title>Planeador EF 2026</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#0F172A; --bg2:#1E293B; --bg3:#334155;
    --text:#F1F5F9; --text2:#94A3B8; --text3:#64748B;
    --border:rgba(255,255,255,0.1);
    --c1:#3B82F6; --c2:#10B981; --c3:#EF4444;
    --gold:#F59E0B; --purple:#8B5CF6;
    --radius:14px; --gap:10px;
    --font: 'Georgia', serif;
    --font2: system-ui, -apple-system, sans-serif;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
  #app{height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  /* ── HEADER ── */
  #header{
    background:linear-gradient(135deg,#1E3A5F,#0F172A);
    border-bottom:1px solid var(--border);
    padding:12px 16px;
    display:flex;align-items:center;gap:10px;
    min-height:60px;flex-shrink:0;
  }
  #header .logo{font-size:22px;}
  #header .hinfo{flex:1;}
  #header .htitle{font-size:17px;font-weight:bold;color:#F8FAFC;}
  #header .hsub{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
  #header .hdate{font-size:11px;color:var(--c1);margin-top:2px;}
  #header .hbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
    border-radius:8px;color:white;padding:6px 10px;cursor:pointer;font-size:18px;display:flex;align-items:center;}

  /* ── VIEWS ── */
  .view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .view.active{display:flex;flex-direction:column;}

  /* ── HOME VIEW ── */
  #v-home{padding:20px 16px;gap:16px;}
  .status-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 20px;text-align:center;}
  .status-card .sc-label{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .status-card .sc-date{font-size:16px;font-weight:bold;}
  .status-card .sc-ctx{margin-top:8px;font-size:12px;padding:4px 12px;border-radius:20px;
    display:inline-block;font-family:var(--font2);}
  .sc-ctx.cls{background:rgba(16,185,129,.15);color:#86EFAC;}
  .sc-ctx.vac{background:rgba(245,158,11,.15);color:#FCD34D;}
  .sc-ctx.oth{background:rgba(148,163,184,.1);color:#94A3B8;}

  .grade-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grade-btn{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);
    padding:20px 12px;cursor:pointer;text-align:center;transition:all .15s;
    display:flex;flex-direction:column;align-items:center;gap:6px;}
  .grade-btn:active{transform:scale(.97);}
  .grade-btn .gb-emoji{font-size:36px;}
  .grade-btn .gb-label{font-size:15px;font-weight:bold;color:#F8FAFC;}
  .grade-btn .gb-sub{font-size:10px;color:var(--text3);font-family:var(--font2);}
  .grade-btn .gb-tema{font-size:10px;margin-top:2px;padding:2px 8px;border-radius:10px;font-family:var(--font2);}

  .section-title{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;
    text-align:center;padding:4px 0;}

  .trim-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .trim-badge{border-radius:20px;padding:5px 14px;font-size:11px;font-family:var(--font2);}

  /* ── SESSION VIEW ── */
  #v-session{padding:0;}
  #session-header{padding:10px 14px 0;flex-shrink:0;}
  #session-scroll{flex:1;overflow-y:auto;padding:10px 14px 20px;-webkit-overflow-scrolling:touch;}

  .trim-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;
    scrollbar-width:none;-ms-overflow-style:none;}
  .trim-tabs::-webkit-scrollbar{display:none;}
  .ttab{flex:0 0 auto;border-radius:20px;padding:5px 14px;font-size:11px;cursor:pointer;
    border:1.5px solid transparent;font-family:var(--font2);transition:all .15s;}

  .week-nav{display:flex;align-items:center;gap:8px;margin:10px 0;}
  .wnav-btn{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
    padding:8px 14px;color:white;cursor:pointer;font-size:15px;font-family:var(--font2);}
  .wnav-btn:disabled{color:var(--bg3);cursor:not-allowed;}
  .wnav-info{flex:1;text-align:center;border-radius:12px;padding:9px 8px;}
  .wnav-info .wn-num{font-size:13px;font-weight:bold;}
  .wnav-info .wn-rng{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--font2);}

  .accordion{margin-bottom:8px;border-radius:var(--radius);overflow:hidden;
    border:1px solid var(--border);}
  .acc-header{width:100%;background:var(--bg2);border:none;padding:13px 14px;cursor:pointer;
    color:white;display:flex;align-items:center;gap:8px;text-align:left;}
  .acc-header:active{background:var(--bg3);}
  .acc-icon{font-size:18px;flex-shrink:0;}
  .acc-label{flex:1;font-size:13px;font-weight:bold;font-family:var(--font);}
  .acc-arrow{font-size:12px;opacity:.6;font-family:var(--font2);}
  .acc-body{background:rgba(255,255,255,.02);padding:12px 14px;
    border-top:1px solid rgba(255,255,255,.06);display:none;}
  .acc-body.open{display:block;}
  .acc-text{font-size:12px;line-height:1.8;color:#CBD5E1;white-space:pre-wrap;font-family:var(--font2);}

  .comp-grid{display:flex;flex-direction:column;gap:10px;}
  .comp-item .ci-label{font-size:10px;font-weight:bold;letter-spacing:1px;
    text-transform:uppercase;margin-bottom:3px;font-family:var(--font2);}
  .comp-item .ci-text{font-size:12px;color:#CBD5E1;line-height:1.6;font-family:var(--font2);}

  .notes-area{width:100%;min-height:80px;background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.15);border-radius:10px;
    color:#F1F5F9;padding:8px 10px;font-size:12px;line-height:1.6;
    resize:vertical;font-family:var(--font2);}

  .footer-info{margin:8px 0 0;padding:10px 14px;background:rgba(255,255,255,.03);
    border-radius:10px;text-align:center;font-size:10px;color:var(--text3);font-family:var(--font2);}

  /* ── CALENDAR VIEW ── */
  #v-calendar{padding:14px;}
  .cal-title{font-size:12px;color:var(--text3);text-align:center;margin-bottom:12px;font-family:var(--font2);}
  .cal-week{display:flex;align-items:center;gap:10px;background:var(--bg2);
    border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;
    margin-bottom:6px;cursor:pointer;transition:all .15s;}
  .cal-week:active{transform:scale(.99);}
  .cal-wnum{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;
    justify-content:center;font-weight:bold;font-size:13px;flex-shrink:0;font-family:var(--font2);}
  .cal-winfo{}
  .cal-wlabel{font-size:13px;font-family:var(--font);}
  .cal-wrng{font-size:10px;color:var(--text3);margin-top:1px;font-family:var(--font2);}
  .badge-hoy{background:#22C55E;border-radius:10px;padding:2px 7px;font-size:9px;
    color:white;margin-left:auto;flex-shrink:0;font-family:var(--font2);}
  .badge-vac{background:#64748B;border-radius:10px;padding:2px 7px;font-size:9px;
    color:white;margin-left:auto;flex-shrink:0;font-family:var(--font2);}

  /* ── BOTTOM NAV ── */
  #bottom-nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
    padding:8px 4px 6px;cursor:pointer;border:none;background:transparent;
    color:var(--text3);transition:color .15s;gap:2px;}
  .bnav-btn.active{color:var(--c1);}
  .bnav-icon{font-size:20px;}
  .bnav-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--font2);}

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px;}
</style>
</head>

function getAcademicContext() {
  const today = new Date();
  today.setHours(12,0,0,0);

  for (const [tKey, tData] of Object.entries(CALENDAR)) {
    if (today < tData.start || today > tData.end) continue;
    if (today >= tData.vacStart && today <= tData.vacEnd) {
      return { status:'vacation', trimKey:tKey, trimData:tData };
    }
    for (let i = 0; i < tData.weeks.length; i++) {
      const w = tData.weeks[i];
      if (today >= w.ms && today <= w.me) {
        return { status:'class', trimKey:tKey, trimData:tData, weekIdx:i };
      }
    }
    return { status:'between_weeks', trimKey:tKey, trimData:tData, weekIdx:0 };
  }
  const yr = today.getFullYear();
  if (yr < 2026 || (yr === 2026 && today < CALENDAR.T1.start))
    return { status:'before_year', trimKey:'T1', trimData:CALENDAR.T1, weekIdx:0 };
  return { status:'after_year', trimKey:'T3', trimData:CALENDAR.T3, weekIdx:12 };
}

function fmtDate(d) {
  const dn = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const mn = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${dn[d.getDay()]} ${d.getDate()} de ${mn[d.getMonth()]} de ${d.getFullYear()}`;
}

/* ═══════ VIEW MANAGEMENT ═══════ */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('v-' + name).classList.add('active');
  state.currentView = name;

  // Nav
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + (name === 'calendar' ? 'calendar' : name === 'session' ? 'session' : 'home')).classList.add('active');

  // Show/hide session nav buttons
  const inSession = name === 'session' || name === 'calendar';
  document.getElementById('nav-session').style.display = inSession ? '' : 'none';
  document.getElementById('nav-calendar').style.display = inSession ? '' : 'none';
  document.getElementById('btn-calendar-toggle').style.display = inSession ? '' : 'none';
}

function goHome() { showView('home'); }
function goSession() { renderSession(); showView('session'); }
function goCalendar() { renderCalendar(); showView('calendar'); }

document.getElementById('btn-calendar-toggle').onclick = () => {
  if (state.currentView === 'calendar') goSession();
  else goCalendar();
};

  const week = tData.weeks[wi];

    tab.textContent = t.label.replace(' Trimestre','°');
    tab.style.color = 'white';
    if (k === state.trim) {
      tab.style.background = t.color;
      tab.style.borderColor = t.color;

      tab.style.background = 'rgba(255,255,255,0.07)';
      tab.style.borderColor = 'rgba(255,255,255,0.12)';
    }
    tab.onclick = () => { state.trim = k; state.weekIdx = 0; renderSession(); };

  const navEl = document.getElementById('week-nav');

    <button class="wnav-btn" ${wi===0?'disabled':''} onclick="changeWeek(-1)">←</button>

      <div class="wn-num" style="color:${tc}">${g.emoji} ${g.label} · Semana ${wi+1} / ${totalW}</div>

    { key:'niv',  label:'Estrategia de Nivelación',icon:'🔁', idx:4, defOpen:false },
    { key:'obs',  label:'Observaciones',           icon:'📝', idx:5, defOpen:false },
  ];

    const openKey = g.id + state.trim + wi + sec.key;

    const hdr = document.createElement('button');

    hdr.style.background = isOpen ? tc + '28' : '';

    txt.textContent = session[sec.idx] || '—';

    hdr.onclick = () => {
      state.openSections[openKey] = !state.openSections[openKey];

function changeWeek(delta) {
  const tData = CALENDAR[state.trim];
  const newIdx = state.weekIdx + delta;
  if (newIdx < 0 || newIdx >= tData.weeks.length) return;
  state.weekIdx = newIdx;
  renderSession();
}

/* ═══════ RENDER CALENDAR ═══════ */
function renderCalendar() {
  const tData = CALENDAR[state.trim];
  const tc = tData.color;
  const ctx = state.todayCtx;

  document.getElementById('cal-title').textContent = `${tData.label} — ${tData.weeks.length} semanas`;

  const container = document.getElementById('cal-weeks');
  container.innerHTML = '';

  tData.weeks.forEach((w, i) => {
    const div = document.createElement('div');
    div.className = 'cal-week';
    const isActive = state.weekIdx === i;
    if (isActive) {
      div.style.background = tc + '22';
      div.style.borderColor = tc;
    }

    const numDiv = document.createElement('div');
    numDiv.className = 'cal-wnum';
    numDiv.style.background = isActive ? tc : 'rgba(255,255,255,0.1)';
    numDiv.textContent = w.n;

    const info = document.createElement('div');
    info.className = 'cal-winfo';
    info.innerHTML = `<div class="cal-wlabel" style="font-weight:${isActive?'bold':'normal'}">Semana ${w.n}</div><div class="cal-wrng">${w.rng}</div>`;

    div.appendChild(numDiv);
    div.appendChild(info);

    // HOY badge
    if (ctx.status === 'class' && ctx.trimKey === state.trim && ctx.weekIdx === i) {
      const badge = document.createElement('div');
      badge.className = 'badge-hoy';
      badge.textContent = 'HOY';
      div.appendChild(badge);
    }

    div.onclick = () => {
      state.weekIdx = i;
      renderSession();
      showView('session');
    };
    container.appendChild(div);
  });
}
